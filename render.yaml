services:
  - type: web
    name: farming
    runtime: python
    buildCommand: pip install -r farming/requirements.txt && python farming/smartfarming/manage.py migrate --noinput && python farming/smartfarming/manage.py collectstatic --noinput
    startCommand: cd farming/smartfarming && gunicorn smartfarming.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
