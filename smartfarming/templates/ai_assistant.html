{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>SmartFarm AI · Chat Anytime</title>
  <!-- Font Awesome Icons & Google Font -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f1f8e9 0%, #dcedc8 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.1"><path d="M40 140 L60 80 L80 140 L70 160 L50 160 Z" fill="%232e7d32"/><circle cx="130" cy="60" r="15" fill="%234caf50"/><path d="M160 160 Q170 140 180 160" stroke="%2366bb6a" stroke-width="6" fill="none"/></svg>');
      background-size: 200px 200px;
    }

    /* main container */
    .chat-container {
      max-width: 900px;
      width: 100%;
      margin: 20px auto;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      border-radius: 40px 40px 30px 30px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      border: 1px solid #c5e1a5;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 90vh;
    }

    /* header */
    .chat-header {
      background: linear-gradient(90deg, #2e7d32 0%, #4caf50 100%);
      padding: 20px 25px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .chat-header h1 {
      color: white;
      font-size: 1.8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chat-header h1 i {
      font-size: 2rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    .language-selector {
      display: flex;
      gap: 10px;
      background: rgba(255,255,255,0.2);
      padding: 5px 10px;
      border-radius: 40px;
    }
    .lang-btn {
      background: transparent;
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.95rem;
    }
    .lang-btn.active {
      background: white;
      color: #2e7d32;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* chat messages area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 25px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: #f9fff9;
    }

    /* message bubbles */
    .message {
      display: flex;
      max-width: 85%;
      animation: fadeSlide 0.3s ease;
    }
    .message.farmer {
      align-self: flex-start;
    }
    .message.ai {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message-content {
      padding: 14px 18px;
      border-radius: 25px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      line-height: 1.5;
      font-size: 1rem;
    }
    .farmer .message-content {
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      color: #1b5e20;
      border-bottom-left-radius: 5px;
    }
    .ai .message-content {
      background: white;
      border: 1px solid #c8e6c9;
      color: #2e3b2e;
      border-bottom-right-radius: 5px;
    }
    .message i {
      font-size: 1.5rem;
      margin: 0 8px;
      align-self: flex-end;
      color: #4caf50;
    }

    /* typing indicator */
    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 15px 20px;
      background: #f0f4f0;
      border-radius: 30px;
      width: fit-content;
      border: 1px solid #c8e6c9;
    }
    .typing-indicator span {
      width: 10px;
      height: 10px;
      background: #4caf50;
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }

    /* image preview */
    .image-preview {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #e8f5e9;
      padding: 8px 15px;
      border-radius: 30px;
      margin: 5px 0;
    }
    .image-preview img {
      max-width: 60px;
      max-height: 60px;
      border-radius: 10px;
    }

    /* input area */
    .chat-input-area {
      background: white;
      border-top: 2px solid #c5e1a5;
      padding: 15px 25px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-input-area input[type="text"] {
      flex: 1;
      border: 2px solid #c5e1a5;
      border-radius: 40px;
      padding: 14px 20px;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    .chat-input-area input[type="text"]:focus {
      border-color: #2e7d32;
    }
    .action-btn {
      background: #e8f5e9;
      border: none;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      color: #2e7d32;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover {
      background: #2e7d32;
      color: white;
      transform: scale(1.08);
    }
    #sendBtn {
      background: #2e7d32;
      color: white;
    }
    #sendBtn:hover {
      background: #1e5a20;
    }
    #voiceBtn.listening {
      background: #d32f2f;
      color: white;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    /* hidden file input */
    #imageUpload {
      display: none;
    }

    /* animations */
    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* mobile */
    @media (max-width: 600px) {
      .chat-container { height: 95vh; margin: 10px; border-radius: 30px; }
      .chat-header { flex-direction: column; align-items: start; }
      .language-selector { align-self: flex-end; }
      .message { max-width: 95%; }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <!-- Header with title & language selector -->
    <div class="chat-header">
        <a href="javascript:history.back()" class="btn btn-outline-light rounded-pill text-decoration-none" style="color:#000;border-color:#000;background:rgba(255,255,255,0.85);">
            <i class="fas fa-arrow-left me-2"></i> Back
        </a>
      <h1>
        <i class="fas fa-robot"></i> 
        Smart Farming AI Assistant
      </h1>
      <div class="language-selector">
        <button class="lang-btn active" data-lang="en">English</button>
        <button class="lang-btn" data-lang="hi">हिन्दी</button>
        <button class="lang-btn" data-lang="gu">ગુજરાતી</button>
      </div>
    </div>

    <!-- Chat messages display -->
    <div class="chat-messages" id="chatMessages">
      <!-- Welcome message from AI -->
      <div class="message ai">
        <i class="fas fa-leaf"></i>
        <div class="message-content" id="welcomeMsg">
          🌱 Namaste! I'm your Smart Farming assistant. Ask me about crops, diseases, fertilizers, or upload a photo of a diseased leaf.
        </div>
      </div>
      <!-- Typing indicator (hidden) -->
      <div id="typingIndicator" class="typing-indicator" style="display: none;">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- Image preview area -->
    <div id="imagePreviewContainer" style="display: none; padding: 0 25px;">
      <div class="image-preview">
        <i class="fas fa-image" style="color: #2e7d32;"></i>
        <span id="imagePreviewName"></span>
        <button id="clearImageBtn" style="margin-left: auto; background: none; border: none; color: red; cursor: pointer;"><i class="fas fa-times-circle"></i></button>
      </div>
    </div>

    <!-- Input area -->
    <div class="chat-input-area">
      <button class="action-btn" id="attachBtn" title="Upload crop photo"><i class="fas fa-camera"></i></button>
      <input type="file" id="imageUpload" accept="image/*">
      <button class="action-btn" id="voiceBtn" title="Speak your question"><i class="fas fa-microphone"></i></button>
      <input type="text" id="messageInput" placeholder="Ask your farming question...">
      <button class="action-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <script>
    (function() {
      // ---------- LANGUAGE RESPONSE DATABASE (multilingual mock) ----------
      const responses = {
        en: {
          welcome: "🌱 Namaste! I'm your Smart Farming assistant. Ask me about crops, diseases, fertilizers, or upload a photo of a diseased leaf.",
          default: "I'm here to help! Could you please provide more details about your farming issue?",
          crop: "Based on your soil and climate, you might consider growing Wheat, Cotton, or Groundnut. Would you like detailed guidance?",
          yellowLeaves: "Yellow leaves could be due to nitrogen deficiency, overwatering, or pests. Try applying a nitrogen-rich fertilizer and ensure proper drainage. Upload a photo for precise diagnosis.",
          fertilizer: "For most crops, a balanced NPK fertilizer (e.g., 10:26:26) at sowing time works well. Soil testing is recommended. Which crop are you growing?",
          disease: "It might be a fungal infection like leaf spot or blight. I recommend neem oil spray or copper oxychloride. Please share a clear image for accurate detection.",
          irrigation: "Drip irrigation is best for water efficiency. Most vegetables need about 1-1.5 inches of water per week, depending on the stage.",
          pest: "Common pests include aphids and armyworms. Use neem oil or appropriate insecticides. Introducing beneficial insects like ladybugs also helps.",
        },
        hi: {
          welcome: "🌱 नमस्ते! मैं आपका स्मार्ट कृषि सहायक हूँ। फसल, बीमारी, उर्वरक के बारे में पूछें या रोगग्रस्त पत्ती की फोटो अपलोड करें।",
          default: "कृपया अधिक जानकारी दें, मैं आपकी मदद के लिए यहाँ हूँ।",
          crop: "आपकी मिट्टी और जलवायु के अनुसार गेहूँ, कपास या मूंगफली उगा सकते हैं। विस्तृत सलाह चाहिए?",
          yellowLeaves: "पीली पत्तियाँ नाइट्रोजन की कमी, अधिक पानी या कीटों से हो सकती हैं। नाइट्रोजन युक्त खाद डालें और जल निकासी सुधारें। सटीक जाँच के लिए फोटो भेजें।",
          fertilizer: "अधिकांश फसलों के लिए संतुलित NPK खाद (जैसे 10:26:26) बुवाई के समय अच्छी रहती है। मिट्टी जाँच सर्वोत्तम है। कौन सी फसल उगा रहे हैं?",
          disease: "यह फफूंद जनित रोग (पत्ती धब्बा या झुलसा) हो सकता है। नीम तेल या कॉपर ऑक्सीक्लोराइड स्प्रे करें। सटीक पहचान के लिए साफ फोटो भेजें।",
          irrigation: "ड्रिप सिंचाई से पानी की बचत होती है। अधिकांश सब्जियों को प्रति सप्ताह 1-1.5 इंच पानी चाहिए।",
          pest: "सामान्य कीट: एफिड, सेना कीट। नीम तेल या उचित कीटनाशक का प्रयोग करें। लाभकारी कीट जैसे लेडीबग को बढ़ावा दें।",
        },
        gu: {
          welcome: "🌱 નમસ્તે! હું તમારો સ્માર્ટ ખેતી સહાયક છું. પાક, રોગ, ખાતર વિશે પૂછો અથવા રોગિષ્ઠ પાનનો ફોટો અપલોડ કરો.",
          default: "કૃપા કરીને વધુ વિગતો આપો, હું તમારી મદદ માટે અહીં છું.",
          crop: "તમારી જમીન અને આબોહવા પ્રમાણે ઘઉં, કપાસ કે મગફળી ઉગાડી શકો છો. વિગતવાર સલાહ જોઈએ?",
          yellowLeaves: "પીળાં પાન નાઇટ્રોજનની ઉણપ, વધુ પાણી અથવા જીવાતોને કારણે થાય છે. નાઇટ્રોજન ખાતર આપો અને નિકાસ સુધારો. ચોક્કસ નિદાન માટે ફોટો મોકલો.",
          fertilizer: "મોટા ભાગના પાક માટે સંતુલિત NPK ખાતર (દા.ત. 10:26:26) વાવણી વખતે સારું રહે છે. જમીન તપાસ શ્રેષ્ઠ છે. કયો પાક ઉગાડો છો?",
          disease: "આ ફૂગ રોગ (પાન ધબ્બા કે ઝુલસ) હોઈ શકે. નીમ તેલ અથવા કોપર ઓક્સીક્લોરાઈડ છાંટો. ચોક્કસ ઓળખ માટે સ્પષ્ટ ફોટો મોકલો.",
          irrigation: "ટપક સિંચાઈ પાણી બચાવે છે. મોટાભાગના શાકભાજીને અઠવાડિયે 1-1.5 ઇંચ પાણી જોઈએ.",
          pest: "સામાન્ય જીવાત: એફિડ, લશ્કરી કીડો. નીમ તેલ અથવા યોગ્ય જંતુનાશક વાપરો. ફાયદાકારક જીવાતો જેમ કે લેડીબગને પ્રોત્સાહન આપો.",
        }
      };

      // Mock disease analysis result (for image upload)
      function getDiseaseAnalysis(lang) {
        const data = {
          en: {
            disease: "Early Blight (Alternaria solani)",
            cause: "Fungal infection due to high humidity and poor air circulation.",
            remedy: "Spray Mancozeb or Copper oxychloride 0.25% every 10 days.",
            prevention: "Avoid overhead irrigation, remove infected leaves, practice crop rotation."
          },
          hi: {
            disease: "अगेती झुलसा (अल्टरनेरिया सोलानी)",
            cause: "उच्च नमी और खराब वायु संचार के कारण फफूंद संक्रमण।",
            remedy: "मैन्कोजेब या कॉपर ऑक्सीक्लोराइड 0.25% का हर 10 दिन में छिड़काव करें।",
            prevention: "ऊपर से सिंचाई से बचें, संक्रमित पत्तियाँ हटाएँ, फसल चक्र अपनाएँ।"
          },
          gu: {
            disease: "અગેતી ઝુલસ (અલ્ટરનેરિયા સોલાની)",
            cause: "ઉચ્ચ ભેજ અને નબળા હવા પરિભ્રમણને કારણે ફૂગ ચેપ.",
            remedy: "મેન્કોઝેબ અથવા કોપર ઓક્સીક્લોરાઇડ 0.25% દર 10 દિવસે છાંટો.",
            prevention: "ઉપરથી સિંચાઈ ટાળો, ચેપગ્રસ્ત પાન દૂર કરો, પાક ફેરબદલ કરો."
          }
        };
        return data[lang] || data.en;
      }

      // ---------- DOM elements ----------
      const chatMessages = document.getElementById('chatMessages');
      const typingIndicator = document.getElementById('typingIndicator');
      const messageInput = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const attachBtn = document.getElementById('attachBtn');
      const imageUpload = document.getElementById('imageUpload');
      const imagePreviewContainer = document.getElementById('imagePreviewContainer');
      const imagePreviewName = document.getElementById('imagePreviewName');
      const clearImageBtn = document.getElementById('clearImageBtn');
      const langBtns = document.querySelectorAll('.lang-btn');
      const welcomeMsgSpan = document.getElementById('welcomeMsg');

      // ---------- state ----------
      let currentLang = 'en';
      let uploadedImageFile = null;  // holds the file object if any

      // Update welcome message on language change
      function updateWelcome() {
        welcomeMsgSpan.innerText = responses[currentLang].welcome;
      }

      // Language switching
      langBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          langBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentLang = btn.dataset.lang;
          updateWelcome();
        });
      });

      // Helper: add a message to the chat
      function addMessage(text, sender = 'farmer') {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        const icon = sender === 'farmer' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-leaf"></i>';
        // Farmer on left, AI on right. For farmer: icon left, bubble right? Wait: spec: farmer left, AI right.
        // So farmer: icon then bubble; AI: bubble then icon.
        if (sender === 'farmer') {
          messageDiv.innerHTML = `
            ${icon}
            <div class="message-content">${text}</div>
          `;
        } else {
          messageDiv.innerHTML = `
            <div class="message-content">${text}</div>
            ${icon}
          `;
        }
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      // Show/hide typing indicator
      function showTyping() {
        typingIndicator.style.display = 'flex';
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }
      function hideTyping() {
        typingIndicator.style.display = 'none';
      }

      // Simulate AI response for text (mock, replace with OpenAI API later)
      function getAIResponse(userText, lang) {
        return new Promise((resolve) => {
          setTimeout(() => {
            const lower = userText.toLowerCase();
            if (lower.includes('crop') || lower.includes('grow') || lower.includes('which') || lower.includes('फसल') || lower.includes('કયો')) 
              resolve(responses[lang].crop);
            else if (lower.includes('yellow') || lower.includes('पीली') || lower.includes('પીળા')) 
              resolve(responses[lang].yellowLeaves);
            else if (lower.includes('fertilizer') || lower.includes('खाद') || lower.includes('ખાતર')) 
              resolve(responses[lang].fertilizer);
            else if (lower.includes('disease') || lower.includes('रोग') || lower.includes('રોગ')) 
              resolve(responses[lang].disease);
            else if (lower.includes('irrigation') || lower.includes('सिंचाई') || lower.includes('સિંચાઈ')) 
              resolve(responses[lang].irrigation);
            else if (lower.includes('pest') || lower.includes('कीट') || lower.includes('જીવાત')) 
              resolve(responses[lang].pest);
            else 
              resolve(responses[lang].default);
          }, 1500);
        });
      }

      // Handle sending a message
      async function handleSend() {
        const text = messageInput.value.trim();
        const hasImage = uploadedImageFile !== null;

        if (!text && !hasImage) return;

        // Show user message
        if (hasImage) {
          addMessage(`📷 ${uploadedImageFile.name}${text ? ' — ' + text : ''}`, 'farmer');
        } else {
          addMessage(text, 'farmer');
        }

        messageInput.value = '';
        showTyping();

        // Build FormData
        const fd = new FormData();
        if (text) fd.append('message', text);
        fd.append('lang', currentLang);
        if (hasImage) fd.append('image', uploadedImageFile);
        fd.append('csrfmiddlewaretoken', getCookie('csrftoken'));

        // Clear image
        uploadedImageFile = null;
        imagePreviewContainer.style.display = 'none';
        imageUpload.value = '';

        try {
          const res = await fetch('/ai-chat/', { method: 'POST', body: fd });
          const data = await res.json();
          hideTyping();
          if (data.success) {
            addMessage(data.reply, 'ai');
          } else {
            addMessage('⚠️ ' + (data.message || 'Something went wrong.'), 'ai');
          }
        } catch(e) {
          hideTyping();
          addMessage('⚠️ Network error. Please try again.', 'ai');
        }
      }

      function getCookie(name) {
        let v = null;
        document.cookie.split(';').forEach(c => {
          c = c.trim();
          if (c.startsWith(name + '=')) v = decodeURIComponent(c.slice(name.length + 1));
        });
        return v;
      }

      // ---------- Event listeners ----------
      sendBtn.addEventListener('click', handleSend);
      messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSend();
      });

      // Image attachment
      attachBtn.addEventListener('click', () => {
        imageUpload.click();
      });

      imageUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          uploadedImageFile = file;
          imagePreviewName.innerText = file.name;
          imagePreviewContainer.style.display = 'block';
        }
      });

      clearImageBtn.addEventListener('click', () => {
        uploadedImageFile = null;
        imageUpload.value = '';
        imagePreviewContainer.style.display = 'none';
      });

      // ---------- VOICE INPUT ----------
      const voiceBtn = document.getElementById('voiceBtn');
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        voiceBtn.style.display = 'none'; // hide if browser doesn't support
      } else {
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;

        // set language based on selected lang
        function getSpeechLang(lang) {
          return { en: 'en-IN', hi: 'hi-IN', gu: 'gu-IN' }[lang] || 'en-IN';
        }

        let isListening = false;

        voiceBtn.addEventListener('click', () => {
          if (isListening) {
            recognition.stop();
            return;
          }
          recognition.lang = getSpeechLang(currentLang);
          recognition.start();
        });

        recognition.onstart = () => {
          isListening = true;
          voiceBtn.classList.add('listening');
          voiceBtn.title = 'Listening... click to stop';
          messageInput.placeholder = '🎙️ Listening...';
        };

        recognition.onresult = (e) => {
          const transcript = e.results[0][0].transcript;
          messageInput.value = transcript;
          messageInput.focus();
        };

        recognition.onend = () => {
          isListening = false;
          voiceBtn.classList.remove('listening');
          voiceBtn.title = 'Speak your question';
          messageInput.placeholder = 'Ask your farming question...';
        };

        recognition.onerror = (e) => {
          isListening = false;
          voiceBtn.classList.remove('listening');
          messageInput.placeholder = 'Ask your farming question...';
          if (e.error === 'not-allowed') {
            addMessage('⚠️ Microphone permission denied. Please allow mic access.', 'ai');
          }
        };
      }

      // Optional: Voice input (not required but nice) – we can add a simple browser speech
      // but spec didn't require, so skipping for brevity.
