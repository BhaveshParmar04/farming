{% extends "base.html" %}
{% load static %}
{% block title %}Farmer Login - Agrikon{% endblock %}

{% block content %}
{% block styles %}
{{ block.super }}
<style>

.login-wrapper{
max-width:450px;
margin:auto;
margin-top:80px;
margin-bottom:80px;
min-height:450px;
background:rgba(255,255,255,0.95);
padding:40px 40px 80px 40px;
border-radius:15px;
box-shadow:0 25px 40px rgba(0,0,0,0.25);
border:1px solid #cfe7c0;
}

.login-title{
font-size:2rem;
color:#1e4f1e;
margin-bottom:25px;
font-weight:700;
border-left:8px solid #4caf50;
padding-left:15px;
margin-bottom:60px;
}

.input-group-custom{
display:flex;
align-items:center;
background:#f4fef0;
border-radius:10px;
margin-bottom:20px;
border:1.5px solid #b2dba0;
}

.input-group-custom i{
width:50px;
text-align:center;
font-size:1.4rem;
color:#2d6e2d;
}

.input-group-custom input{
flex:1;
border:none;
background:transparent;
padding:14px;
outline:none;
font-size:1rem;
}

.btn-login{
background:linear-gradient(145deg,#2e7d32,#4caf50);
color:white;
border:none;
padding:14px;
width:100%;
border-radius:10px;
font-weight:700;
font-size:1.2rem;
margin-top:10px;
transition:0.2s;
cursor:pointer;
}

.btn-login:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.register-link{
text-align:center;
margin-top:20px;
}

.register-link a{
color:#2e7d32;
font-weight:600;
text-decoration:none;
}

.register-link a:hover{
text-decoration:underline;
}

.otp-box{
display:none;
}

.login-error{
margin-top:-10px;
margin-bottom:15px;
color:#d32f2f;
font-size:0.9rem;
font-weight:500;
}

.login-success{
margin-top:-10px;
margin-bottom:15px;
color:#2e7d32;
font-size:0.9rem;
font-weight:500;
}

.otp-timer{
margin-top:10px;
margin-bottom:10px;
font-size:0.9rem;
color:#2d6e2d;
font-weight:500;
}

</style>
{% endblock %}


<div class="login-wrapper">

<h2 class="login-title">
<i class="fas fa-tractor"></i> Smart Farm Login
</h2>

<form id="loginForm" onsubmit="return false;">

<div class="input-group-custom">
<i class="fas fa-mobile-alt"></i>
<input type="tel"
id="mobile"
placeholder="Enter mobile number"
pattern="[0-9]{10}"
maxlength="10"
required>
</div>

<div id="mobileError" class="login-error"></div>
<div id="loginSuccess" class="login-success"></div>

<button type="button" class="btn-login" id="sendOtpBtn" onclick="sendOTP()">
Send OTP
</button>

<div class="otp-box" id="otpBox">

<div class="input-group-custom mt-3">
<i class="fas fa-key"></i>
<input type="text"
id="otp"
placeholder="Enter OTP"
maxlength="6">
</div>

<div id="otpError" class="login-error"></div>
<div id="otpTimer" class="otp-timer"></div>

<button type="button" class="btn-login" onclick="verifyOTP()">
Verify OTP
</button>

</div>

</form>

<div class="register-link">
Don't have an account?
<a href="{% url 'register' %}">Register Now</a>
</div>
<div class="register-link" style="margin-top:10px;padding-top:10px;border-top:1px solid #e0f0e0;">
Are you a Buyer?
<a href="{% url 'buyer_register' %}" style="color:#1565c0;">Register as Buyer</a>
</div>

</div>

<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== "") {
        let cookies = document.cookie.split(";");
        for (let i = 0; i < cookies.length; i++) {
            let cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + "=")) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

let timeLeft = 120;
let timerInterval = null;

function sendOTP(){

    let mobile = document.getElementById("mobile").value.trim();
    let mobileError = document.getElementById("mobileError");
    let loginSuccess = document.getElementById("loginSuccess");
    let sendBtn = document.getElementById("sendOtpBtn");

    mobileError.innerHTML = "";
    loginSuccess.innerHTML = "";

    if(mobile === ""){
        mobileError.innerHTML = "Please enter mobile number";
        return;
    }

    if(!/^[0-9]+$/.test(mobile)){
        mobileError.innerHTML = "Mobile number must contain only digits";
        return;
    }

    if(mobile.length != 10){
        mobileError.innerHTML = "Enter valid 10 digit mobile number";
        return;
    }

    fetch("{% url 'send_login_otp' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": getCookie("csrftoken")
        },
        body: new URLSearchParams({
            mobile: mobile
        })
    })
    .then(response => response.json())
    .then(data => {
        if(data.success){
            document.getElementById("otpBox").style.display = "block";
            sendBtn.disabled = true;
            sendBtn.innerText = "OTP Sent";
            loginSuccess.innerHTML = data.message;

            // demo only - remove later
            alert("Demo OTP: " + data.demo_otp);

            startTimer();
        }else{
            mobileError.innerHTML = data.message;
        }
    })
    .catch(error => {
        mobileError.innerHTML = "Something went wrong while sending OTP.";
        console.log(error);
    });
}

function startTimer(){
    let timerDiv = document.getElementById("otpTimer");

    if(timerInterval){
        clearInterval(timerInterval);
    }

    timeLeft = 120;

    timerInterval = setInterval(function(){
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;

        if(seconds < 10){
            seconds = "0" + seconds;
        }

        timerDiv.innerHTML = "OTP expires in: " + minutes + ":" + seconds;
        timeLeft--;

        if(timeLeft < 0){
            clearInterval(timerInterval);
            timerDiv.innerHTML = "OTP expired";
            document.getElementById("sendOtpBtn").disabled = false;
            document.getElementById("sendOtpBtn").innerText = "Resend OTP";
        }
    }, 1000);
}

function verifyOTP(){

    let mobile = document.getElementById("mobile").value.trim();
    let otp = document.getElementById("otp").value.trim();
    let otpError = document.getElementById("otpError");
    let loginSuccess = document.getElementById("loginSuccess");

    otpError.innerHTML = "";
    loginSuccess.innerHTML = "";

    if(otp === ""){
        otpError.innerHTML = "Please enter OTP";
        return;
    }

    if(!/^[0-9]+$/.test(otp)){
        otpError.innerHTML = "OTP must contain only digits";
        return;
    }

    if(otp.length != 6){
        otpError.innerHTML = "OTP must be exactly 6 digits";
        return;
    }

    fetch("{% url 'verify_login_otp' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": getCookie("csrftoken")
        },
        body: new URLSearchParams({
            mobile: mobile,
            otp: otp
        })
    })
    .then(response => response.json())
    .then(data => {
        if(data.success){
            loginSuccess.innerHTML = data.message;
            window.location.href = data.redirect_url;
        }else{
            otpError.innerHTML = data.message;
        }
    })
    .catch(error => {
        otpError.innerHTML = "Something went wrong while verifying OTP.";
        console.log(error);
    });
}
</script>

{% endblock %}
